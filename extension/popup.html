<!DOCTYPE html>
<html>
<head>
  <title>AI Phishing Guard</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #121212;
      color: white;
      width: 300px;
      padding: 20px;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 15px;
      text-align: center;
    }

    .status {
      text-align: center;
      font-size: 16px;
      margin-bottom: 10px;
    }

    .safe {
      color: #4CAF50;
    }

    .danger {
      color: #ff4d4d;
    }

    .box {
      background: #1e1e1e;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 14px;
      word-break: break-all;
    }

    .score {
      font-size: 16px;
      text-align: center;
      margin: 10px 0;
    }

    button {
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 8px;
    }

    .scan {
      background: #2196F3;
      color: white;
    }

    .dashboard {
      background: #555;
      color: white;
    }
  </style>
</head>

<body>

  <h1>🛡 AI Phishing Guard</h1>

  <div id="url" class="box">Loading...</div>

  <div id="status" class="status">Checking...</div>

  <div id="score" class="score"></div>

  <button class="scan" id="scanBtn">Scan Again</button>

  <button class="dashboard" id="dashboardBtn">Open Dashboard</button>

  <script src="popup.js"></script>

</body>
</html>
